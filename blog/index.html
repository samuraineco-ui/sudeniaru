<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CTWTX2FZX8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-CTWTX2FZX8');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社スデニアル - ブログ</title>
    <meta name="description" content="株式会社スデニアルの公式ブログ一覧です。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2E8B57;
            --text-color: #FFFFFF;
            --accent-color: #C1E1C1;
            --decoration-color: rgba(255, 255, 255, 0.12);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: "Shippori Mincho", "Zen Old Mincho", "Yu Mincho", "Hiragino Mincho ProN", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            min-height: 100vh;
        }
        .bg-decoration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', 'Impact', sans-serif;
            font-weight: 700;
            font-size: 28vw;
            color: var(--decoration-color);
            z-index: -1;
            white-space: nowrap;
            letter-spacing: -0.02em;
            line-height: 1;
            user-select: none;
            pointer-events: none;
        }
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header img {
            height: 50px;
        }
        .back-link {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 2px;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--accent-color);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }
        /* Typography */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
        }
        .post-date {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 40px;
            display: block;
        }
        h2 {
            font-size: 1.5rem;
            margin-top: 50px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }
        p {
            margin-bottom: 20px;
            font-size: 1.05rem;
            letter-spacing: 0.05em;
        }
        a {
            color: var(--accent-color);
        }
        /* Blog List Styles */
        .post-card {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 8px;
            background: rgba(0,0,0,0.1);
            transition: transform 0.2s, background 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            background: rgba(0,0,0,0.15);
        }
        .post-card h2 {
            margin-top: 0;
            border: none;
            padding: 0;
            margin-bottom: 15px;
        }
        .post-card h2 a {
            text-decoration: none;
            color: var(--text-color);
        }
        @media (max-width: 768px) {
            .bg-decoration {
                font-size: 35vw;
                transform: translate(-50%, -50%) rotate(90deg);
            }
            header { padding: 20px; }
            .container { padding: 20px 20px 60px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">SUDENIARU</div>
    <header>
        <a href="../index.html"><img src="../logo.png" alt="sudeniaru"></a>
        <a href="../index.html" class="back-link">コーポレートサイトへ戻る</a>
    </header>
    <main class="container">
        <h1>Blog</h1>
        <article class="post-card">
            <span class="post-date">2026-02-27</span>
            <h2><a href="hello-world.html">スデニアルのブログを始めました</a></h2>
            <p>すでにある価値を発見し未来につなげる株式会社スデニアルの公式ブログです。</p>
        </article>
        
    </main>
    <script id="animation-js" data-basepath="../" src="../animation.js"></script>
</body>
</html>
